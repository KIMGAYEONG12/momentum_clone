<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum 시계화면 꾸미기</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        height: 100vh;
        overflow: hidden;

        font-family: Arial, sans-serif;
        color: white;

        background-image: url("star.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        transition: background-image 1s ease-in-out;
      }

      body::before {
        content: "";

        position: absolute;
        inset: 0;

        background: rgba(0, 0, 0, 0.3);
      }

      .wrapper {
        position: relative;
        z-index: 1;

        width: 100%;
        height: 100vh;
      }

      /* 상단 */
      .top-bar {
        width: 100%;

        position: absolute;
        top: 0;
        left: 0;

        padding: 20px 30px;

        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .left-menu {
        display: flex;
        gap: 30px;
      }

      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;

        cursor: pointer;

        font-size: 14px;

        transition: 0.2s;
      }

      .menu-item:hover {
        transform: scale(1.1);
      }

      .menu-item span {
        font-size: 28px;
        margin-bottom: 5px;
      }

      .right-info {
        display: flex;
        align-items: flex-start;
        gap: 30px;
      }

      .focus-box {
        text-align: center;
      }

      .focus-circle {
        width: 34px;
        height: 34px;

        border: 5px solid rgba(255, 255, 255, 0.25);
        border-top: 5px solid white;
        border-radius: 50%;

        margin: 0 auto 6px auto;
      }

      #focusTime {
        font-size: 38px;
        font-weight: bold;
      }

      .focus-text {
        margin-top: 3px;
        font-size: 14px;
      }

      .weather-area {
        text-align: right;
      }

      .weather-box {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .weather-icon {
        font-size: 24px;
      }

      .weather {
        font-size: 30px;
        font-weight: bold;
      }

      .location {
        margin-top: 4px;
        font-size: 14px;
      }

      /* 중앙 */
      .center-box {
        width: 100%;
        height: 100vh;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        text-align: center;
      }

      #clock {
        font-size: clamp(60px, 10vw, 150px);
        font-weight: bold;

        text-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
      }

      #mainGreeting {
        margin-top: 20px;

        font-size: clamp(30px, 4vw, 70px);
        font-weight: bold;

        text-shadow: 0 0 12px rgba(0, 0, 0, 0.7);
      }

      .question-text {
        margin-top: 60px;

        font-size: clamp(22px, 2.8vw, 45px);
      }

      .question-line {
        border-bottom: 3px solid white;
        padding-bottom: 14px;
      }

      /* 이름 */
      #nameContainer {
        margin-top: 30px;
        text-align: center;
      }

      #nameInput {
        background: none;
        border: none;
        border-bottom: 2px solid white;

        color: white;

        font-size: 28px;
        text-align: center;

        outline: none;
      }

      #savedGreeting {
        font-size: 30px;
        cursor: pointer;
      }

      /* Todo */
      .todo-input-wrapper {
        position: relative;

        width: 60%;

        margin: 30px auto 0 auto;
      }

      #todoInput {
        width: 100%;

        background: none;

        border: none;
        border-bottom: 3px solid white;

        color: white;

        font-size: clamp(20px, 2.2vw, 36px);

        text-align: center;

        outline: none;

        padding-bottom: 10px;
      }

      .todo-label {
        position: absolute;

        left: 50%;
        top: 45%;

        transform: translate(-50%, -50%);

        font-size: clamp(18px, 2vw, 30px);

        color: rgba(255, 255, 255, 0.7);

        pointer-events: none;
      }

      #todoInput:focus + .todo-label,
      #todoInput:not(:placeholder-shown) + .todo-label {
        opacity: 0;
      }

      #todoText {
        margin-top: 20px;

        text-align: center;

        font-size: clamp(22px, 2.5vw, 42px);

        font-weight: bold;

        cursor: pointer;
      }

      /* 명언 */
      #quote {
        width: 100%;

        position: absolute;
        bottom: 30px;
        left: 0;

        text-align: center;

        font-size: 18px;

        text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <!-- 상단 -->
      <div class="top-bar">
        <div class="left-menu">
          <div class="menu-item" onclick="goToGitHubSite()">
            <span>🔗</span>
            <div>Links</div>
          </div>

          <div class="menu-item">
            <span>🎯</span>
            <div>Focus</div>
          </div>
        </div>

        <!-- 오른쪽 -->
        <div class="right-info">
          <div class="focus-box">
            <div class="focus-circle"></div>

            <div id="focusTime">0m</div>

            <div class="focus-text">Focused Today</div>
          </div>

          <div class="weather-area">
            <div class="weather-box">
              <div class="weather-icon" id="weatherIcon">☀️</div>

              <div class="weather" id="weather">24°</div>
            </div>

            <div class="location">Yongsan-gu</div>
          </div>
        </div>
      </div>

      <!-- 중앙 -->
      <div class="center-box">
        <div id="clock">00:00</div>

        <div id="mainGreeting">로딩 중...</div>

        <div class="question-text">
          <span class="question-line"> What is your main goal for today? </span>
        </div>

        <!-- 이름 -->
        <div id="nameContainer">
          <span id="nameQuestion">What is your </span>

          <input
            type="text"
            id="nameInput"
            placeholder="name?"
            onkeypress="saveName(event)"
          />

          <p id="savedGreeting" onclick="editName()" style="display: none"></p>
        </div>

        <!-- Todo -->
        <div class="todo-input-wrapper">
          <input
            type="text"
            id="todoInput"
            placeholder=" "
            onkeypress="handleTodo(event)"
          />

          <span class="todo-label">Todo List</span>
        </div>

        <p id="todoText" onclick="resetTodo()"></p>
      </div>

      <!-- 하단 명언 -->
      <div id="quote"></div>
    </div>

    <script>
      // GitHub 이동
      function goToGitHubSite() {
        window.location.href = "https://github.com/";
      }

      // 이름 불러오기
      function loadName() {
        const savedName = localStorage.getItem("username");

        const questionText = document.getElementById("nameQuestion");
        const input = document.getElementById("nameInput");
        const greet = document.getElementById("savedGreeting");

        if (savedName) {
          questionText.style.display = "none";
          input.style.display = "none";

          greet.style.display = "block";

          updateGreeting(savedName);
        } else {
          questionText.style.display = "inline";
          input.style.display = "inline-block";

          greet.style.display = "none";
        }
      }

      // 이름 저장
      function saveName(event) {
        if (event.key === "Enter") {
          const nameValue = event.target.value;

          if (nameValue.trim() !== "") {
            localStorage.setItem("username", nameValue);

            loadName();
          }
        }
      }

      // 이름 수정
      function editName() {
        localStorage.removeItem("username");

        loadName();

        document.getElementById("nameInput").focus();
      }

      // 인사말 업데이트
      function updateGreeting(name) {
        const hours = new Date().getHours();

        let greeting = "";

        if (hours < 12) {
          greeting = "Good morning";
        } else if (hours < 18) {
          greeting = "Good afternoon";
        } else {
          greeting = "Good evening";
        }

        document.getElementById("savedGreeting").innerHTML =
          `${greeting}, ${name}.`;
      }

      // 배경 이미지
      const backgroundImages = [
        "star.jpg",
        "starscloud.jpg",
        "stars.jpg",
        "japan.jpg",
        "nightcity.jpg",
        "tokyo.jpg",
        "summer.jpg",
        "osaka.jpg",
      ];

      let currentBackgroundIndex = 0;

      function changeBackground() {
        currentBackgroundIndex =
          (currentBackgroundIndex + 1) % backgroundImages.length;

        document.body.style.backgroundImage = `url("${backgroundImages[currentBackgroundIndex]}")`;
      }

      setInterval(changeBackground, 5000);

      // 시계
      function updateClock() {
        const now = new Date();

        let hours = now.getHours();
        let minutes = now.getMinutes();

        minutes = String(minutes).padStart(2, "0");

        document.getElementById("clock").textContent = `${hours}:${minutes}`;

        let greeting = "";

        if (hours < 12) {
          greeting = "Good morning";
        } else if (hours < 18) {
          greeting = "Good afternoon";
        } else {
          greeting = "Good evening";
        }

        document.getElementById("mainGreeting").textContent = greeting;
      }

      updateClock();

      setInterval(updateClock, 1000);

      // 명언
      function showRandomQuote() {
        const quotes = [
          "꿈을 계속 간직하고 있으면 반드시 실현할 때가 온다 - 괴테",
          "시간은 말로써 나타낼 수 없을 만큼 멋진 만물의 소재이다 - 아널드 버넷",
          "시간이 덜어주거나 부드럽게 해주지 않는 슬픔은 없다 - 키케로",
          "The only way to do great work is to love what you do - Steve Jobs",
          "꿈은 노력을 가능하게 만들고 노력은 꿈을 가능하게 만든다 - 폴 포츠",
        ];

        const randomIndex = Math.floor(Math.random() * quotes.length);

        document.getElementById("quote").textContent = quotes[randomIndex];
      }

      showRandomQuote();

      setInterval(showRandomQuote, 5000);

      // 집중 시간
      let focusedMinutes = 0;

      function updateFocusTime() {
        document.getElementById("focusTime").textContent = `${focusedMinutes}m`;

        focusedMinutes++;
      }

      updateFocusTime();

      setInterval(updateFocusTime, 60000);

      // Todo
      function getTodo() {
        const p = document.getElementById("todoText");

        const wrapper = document.querySelector(".todo-input-wrapper");

        const savedTodo = localStorage.getItem("todo");

        if (savedTodo) {
          p.textContent = savedTodo;

          p.style.display = "block";

          wrapper.style.display = "none";
        } else {
          p.style.display = "none";

          wrapper.style.display = "block";
        }
      }

      function setTodo() {
        const input = document.getElementById("todoInput");

        const todoValue = input.value;

        if (todoValue.trim() !== "") {
          localStorage.setItem("todo", todoValue);

          getTodo();
        }
      }

      function handleTodo(event) {
        if (event.key === "Enter") {
          setTodo();
        }
      }

      function resetTodo() {
        localStorage.removeItem("todo");

        document.getElementById("todoInput").value = "";

        getTodo();
      }

      loadName();

      getTodo();

      // 날씨
      const temperature = 24;

      const weatherType = "sunny";

      document.getElementById("weather").textContent = `${temperature}°`;

      let icon = "☀️";

      if (weatherType === "cloudy") {
        icon = "☁️";
      } else if (weatherType === "rain") {
        icon = "🌧️";
      } else if (weatherType === "snow") {
        icon = "❄️";
      }

      document.getElementById("weatherIcon").textContent = icon;
    </script>
  </body>
</html>
