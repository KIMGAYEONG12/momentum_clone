<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum 시계화면 꾸미기</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        height: 100vh;
        overflow: hidden;

        font-family: Arial, sans-serif;
        color: white;

        background-image: url("star.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        /* 추가 */
        transition: background-image 1s ease-in-out;
      }

      /* 어두운 배경 */
      body::before {
        content: "";

        position: absolute;
        inset: 0;

        background: rgba(0, 0, 0, 0.3);
      }

      /* 전체 */
      .wrapper {
        position: relative;
        z-index: 1;

        width: 100%;
        height: 100vh;
      }

      /* 상단 */
      .top-bar {
        width: 100%;

        position: absolute;
        top: 0;
        left: 0;

        padding: 20px 30px;

        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      /* 왼쪽 메뉴 */
      .left-menu {
        display: flex;
        gap: 30px;
      }

      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;

        cursor: pointer;

        font-size: 14px;

        transition: 0.2s;
      }

      .menu-item:hover {
        transform: scale(1.1);
      }

      .menu-item span {
        font-size: 28px;
        margin-bottom: 5px;
      }

      /* 오른쪽 */
      .right-info {
        display: flex;
        align-items: flex-start;
        gap: 30px;
      }

      /* Focus */
      .focus-box {
        text-align: center;
      }

      /* 원형 아이콘 */
      .focus-circle {
        width: 34px;
        height: 34px;

        border: 5px solid rgba(255, 255, 255, 0.25);
        border-top: 5px solid white;
        border-radius: 50%;

        margin: 0 auto 6px auto;
      }

      /* 0m */
      #focusTime {
        font-size: 38px;
        font-weight: bold;
        line-height: 1;
      }

      .focus-text {
        margin-top: 3px;
        font-size: 14px;
      }

      /* 날씨 */
      .weather-area {
        text-align: right;
      }

      .weather-box {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .weather-icon {
        font-size: 24px;
      }

      .weather {
        font-size: 30px;
        font-weight: bold;
      }

      .location {
        margin-top: 4px;
        font-size: 14px;
      }

      /* 중앙 */
      .center-box {
        width: 100%;
        height: 100vh;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        text-align: center;
      }

      /* 시계 */
      #clock {
        font-size: clamp(60px, 10vw, 150px);
        font-weight: bold;
        line-height: 1;
        text-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
      }

      /* 인사말 */
      #greetText {
        margin-top: 20px;

        font-size: clamp(30px, 4vw, 70px);
        font-weight: bold;

        text-shadow: 0 0 12px rgba(0, 0, 0, 0.7);
      }

      /* 질문 */
      #question {
        margin-top: 60px;

        font-size: clamp(22px, 2.8vw, 45px);
      }

      .question-line {
        border-bottom: 3px solid white;
        padding-bottom: 14px;
      }
      /* Todo 영역 */
      .todo-input-wrapper {
        position: relative;

        width: 60%;

        margin-top: 20px;
      }

      /* 입력창 */
      #todoInput {
        width: 100%;

        background: none;

        border: none;
        border-bottom: 3px solid white;

        color: white;

        font-size: clamp(20px, 2.2vw, 36px);

        text-align: center;

        outline: none;

        padding-bottom: 10px;
      }

      /* Todo List 글자 */
      .todo-label {
        position: absolute;

        left: 50%;
        top: 45%;

        transform: translate(-50%, -50%);

        font-size: clamp(18px, 2vw, 30px);

        color: rgba(255, 255, 255, 0.7);

        pointer-events: none;

        transition: 0.3s;
      }

      /* 입력 시 숨김 */
      #todoInput:focus + .todo-label,
      #todoInput:not(:placeholder-shown) + .todo-label {
        opacity: 0;
      }

      #todoText {
        margin-top: 20px;

        font-size: clamp(22px, 2.5vw, 42px);

        font-weight: bold;
      }

      /* 명언 */
      #quote {
        width: 100%;

        position: absolute;
        bottom: 30px;
        left: 0;

        text-align: center;

        font-size: 18px;

        text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
      }

      /* 모바일 */
      @media (max-width: 768px) {
        .top-bar {
          padding: 15px;
        }

        .left-menu {
          gap: 20px;
        }

        .menu-item span {
          font-size: 22px;
        }

        #focusTime {
          font-size: 30px;
        }

        .weather {
          font-size: 24px;
        }

        #question {
          margin-top: 40px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <!-- 상단 -->
      <div class="top-bar">
        <!-- 왼쪽 -->
        <div class="left-menu">
          <!-- 링크 -->
          <div class="menu-item" onclick="goToGitHubSite()">
            <span>🔗</span>
            <div>Links</div>
          </div>

          <!-- Focus -->
          <div class="menu-item">
            <span>🎯</span>
            <div>Focus</div>
          </div>
        </div>

        <!-- 오른쪽 -->
        <div class="right-info">
          <!-- Focused Today -->
          <div class="focus-box">
            <!-- 이미지처럼 원형 -->
            <div class="focus-circle"></div>

            <!-- 시간 -->
            <div id="focusTime">0m</div>

            <div class="focus-text">Focused Today</div>
          </div>

          <!-- 날씨 -->
          <div class="weather-area">
            <div class="weather-box">
              <div class="weather-icon" id="weatherIcon">☀️</div>

              <div class="weather" id="weather">24°</div>
            </div>

            <div class="location">Yongsan-gu</div>
          </div>
        </div>
      </div>

      <!-- 중앙 -->
      <div class="center-box">
        <div id="clock">00:00</div>

        <div id="greetText">로딩 중...</div>

        <div id="question">
          <span class="question-line"> What is your main goal for today? </span>
        </div>
      </div>

      <!-- 이름 -->
        <div id="nameContainer">
          <span id="nameQuestion"> What is your </span>

          <input
            type="text"
            id="nameInput"
            placeholder="name?"
            onkeypress="saveName(event)"
          />

          <p id="greetText" onclick="editName()" style="display: none"></p>
        </div>

        <!-- 질문 -->
        <div id="question">What is your main goal for today?</div>

        <!-- Todo -->
        <div class="todo-input-wrapper">
          <input
            type="text"
            id="todoInput"
            placeholder=" "
            onkeypress="handleTodo(event)"
          />

          <span class="todo-label"> Todo List </span>
        </div>

        <p id="todoText"></p>
      </div>
      
      <!-- 하단 명언 -->
      <div id="quote"></div>
    </div>

    <script>
      // 깃허브사이트 이동
      function goToGitHubSite() {
        window.location.href = "https://github.com/";
      }

      /* 이름 */
    function loadName() {

      const savedName =
        localStorage.getItem("username");

      const questionText =
        document.getElementById("nameQuestion");

      const input =
        document.getElementById("nameInput");

      const greet =
        document.getElementById("greetText");

      if (savedName) {

        questionText.style.display = "none";

        input.style.display = "none";

        greet.style.display = "block";

        updateGreeting(savedName);

      } else {

        questionText.style.display = "inline";

        input.style.display = "inline-block";

        greet.style.display = "none";
      }
    }

    function saveName(event) {

      if (event.key === "Enter") {

        const nameValue = event.target.value;

        if (nameValue.trim() !== "") {

          localStorage.setItem(
            "username",
            nameValue
          );

          loadName();
        }
      }
    }

    function editName() {

      localStorage.removeItem("username");

      loadName();

      document
        .getElementById("nameInput")
        .focus();
    }

    function updateGreeting(name) {

      const hours =
        new Date().getHours();

      let greeting = "";

      if (hours < 12) {

        greeting = "Good morning";

      } else if (hours < 18) {

        greeting = "Good afternoon";

      } else {

        greeting = "Good evening";
      }

      document.getElementById(
        "greetText"
      ).innerHTML =
        `${greeting}, <span class="name-highlight">${name}</span>.`;
    }

      // 배경화면 자동 변경 추가

      const backgroundImages = [
        "star.jpg",
        "starscloud.jpg",
        "stars.jpg",
        "japan.jpg",
        "nightcity.jpg",
        "tokyo.jpg",
        "summer.jpg",
        "osaka.jpg",
      ];

      let currentBackgroundIndex = 0;

      function changeBackground() {
        currentBackgroundIndex++;

        if (currentBackgroundIndex >= backgroundImages.length) {
          currentBackgroundIndex = 0;
        }

        document.body.style.backgroundImage = `url("${backgroundImages[currentBackgroundIndex]}")`;
      }

      // 5초마다 자동 변경
      setInterval(changeBackground, 5000);

      // 시계
      function updateClock() {
        const now = new Date();

        let hours = now.getHours();
        let minutes = now.getMinutes();

        minutes = String(minutes).padStart(2, "0");

        document.getElementById("clock").textContent = `${hours}:${minutes}`;

        // 인사말
        let greeting = "";

        if (hours < 12) {
          greeting = "Good morning, 닉네임.";
        } else if (hours < 18) {
          greeting = "Good afternoon, 닉네임.";
        } else {
          greeting = "Good evening, 닉네임.";
        }

        document.getElementById("greetText").textContent = greeting;
      }

      updateClock();

      setInterval(updateClock, 1000);

      // 명언
      function showRandomQuote() {
        const quotes = [
          "꿈을 계속 간직하고 있으면 반드시 실현할 때가 온다 - 괴테",
          "시간은 말로써 나타낼 수 없을 만큼 멋진 만물으 소재이다 - 아널드 버넷",
          "시간이 덜어주거나 부드럽게 해주지 않는 슬픔이란 하나도 없다 - 키케로",
          "The only way to do great work is to love what you do (번역 : 위대한 일을 하는 유일한 방법은 당신이 하는 일을 사랑하는 것이다.) - Steave Jobs",
          " 끔은 노력을 가능하게 만들고, 노력은 그 꿈을 가능하게 만든다. - 폴 포츠",
          "포기하지 말고 희망을 잃지 말며 자신을 저버리지 말아라. - 크리스토퍼 리브",
        ];

        const randomIndex = Math.floor(Math.random() * quotes.length);

        document.getElementById("quote").textContent = quotes[randomIndex];
      }

      showRandomQuote();

      setInterval(showRandomQuote, 5000);

      // 집중 시간
      let focusedMinutes = 0;

      function updateFocusTime() {
        document.getElementById("focusTime").textContent = `${focusedMinutes}m`;

        focusedMinutes++;
      }

      updateFocusTime();

      setInterval(updateFocusTime, 60000);

      /* Todo */
    function getTodo() {

      let p =
        document.getElementById("todoText");

      let wrapper =
        document.querySelector(".todo-input-wrapper");

      let savedTodo =
        localStorage.getItem("todo");

      if (savedTodo) {

        p.textContent = savedTodo;

        p.style.display = "block";

        wrapper.style.display = "none";

      } else {

        p.style.display = "none";

        wrapper.style.display = "block";
      }
    }

    function setTodo() {

      let input =
        document.getElementById("todoInput");

      let todoValue =
        input.value;

      if (todoValue.trim() !== "") {

        localStorage.setItem(
          "todo",
          todoValue
        );

        getTodo();
      }
    }

    function handleTodo(event) {

      if (event.key === "Enter") {
        setTodo();
      }
    }

    function resetTodo() {

      localStorage.removeItem("todo");

      document.getElementById(
        "todoInput"
      ).value = "";

      getTodo();
    }

    loadName();

    getTodo();
    
      // 날씨
      const temperature = 24;
      const weatherType = "sunny";

      document.getElementById("weather").textContent = `${temperature}°`;

      let icon = "☀️";

      if (weatherType === "cloudy") {
        icon = "☁️";
      } else if (weatherType === "rain") {
        icon = "🌧️";
      } else if (weatherType === "snow") {
        icon = "❄️";
      }

      document.getElementById("weatherIcon").textContent = icon;
    </script>
  </body>
</html>
